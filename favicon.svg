<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ASCII weld spark — maqsudjon.com (code & steel) -->
  <rect width="100" height="100" rx="18.5" fill="#000"/>
  <!-- spark core: 6-arm asterisk -->
  <g stroke="#8DF9E8" stroke-width="7.6" stroke-linecap="butt">
    <line x1="50" y1="23" x2="50" y2="81"/>
    <line x1="24.9" y1="37.5" x2="75.1" y2="66.5"/>
    <line x1="75.1" y1="37.5" x2="24.9" y2="66.5"/>
  </g>
  <!-- side flares -->
  <g stroke="#FFFFFF" stroke-width="3.4"><line x1="12.3" y1="50" x2="23.3" y2="50"/><line x1="17.8" y1="44.5" x2="17.8" y2="55.5"/></g>
  <g stroke="#3AA0C4" stroke-width="3.4"><line x1="76.7" y1="50" x2="87.7" y2="50"/><line x1="82.2" y1="44.5" x2="82.2" y2="55.5"/></g>
  <!-- diagonal sparks -->
  <g stroke="#FF8C6E" stroke-width="3">
    <line x1="71" y1="19.2" x2="77" y2="25.2"/><line x1="77" y1="19.2" x2="71" y2="25.2"/>
    <line x1="23" y1="19.2" x2="29" y2="25.2"/><line x1="29" y1="19.2" x2="23" y2="25.2"/>
  </g>
  <g stroke="#5A82DC" stroke-width="3">
    <line x1="71" y1="80.6" x2="77" y2="86.6"/><line x1="77" y1="80.6" x2="71" y2="86.6"/>
    <line x1="23" y1="80.6" x2="29" y2="86.6"/><line x1="29" y1="80.6" x2="23" y2="86.6"/>
  </g>
  <!-- drifting embers -->
  <rect x="60.2" y="6.2" width="2.7" height="2.7" fill="#F2C8AA"/>
  <rect x="91.2" y="37.2" width="2.4" height="2.4" fill="#FF8C6E"/>
  <rect x="41.2" y="93.2" width="2.6" height="2.6" fill="#3AA0C4"/>
  <rect x="7.3" y="62.3" width="2.4" height="2.4" fill="#F2C8AA"/>
  <rect x="7.6" y="31.6" width="2.5" height="2.5" fill="#8DF9E8"/>
</svg>
